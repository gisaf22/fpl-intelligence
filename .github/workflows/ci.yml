name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  unit-tests:
    name: Unit tests (fixture DB)
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Install uv
        uses: astral-sh/setup-uv@v4
        with:
          version: "latest"

      - name: Set up Python
        run: uv python install 3.12

      - name: Install dependencies
        run: uv sync --all-extras

      - name: Lint (ruff)
        run: uv run ruff check .

      - name: Format check (ruff)
        run: uv run ruff format --check .

      - name: Type check (mypy)
        run: uv run mypy
        continue-on-error: true  # 8 pre-existing errors; remove once Day 3 mypy fixes land

      - name: Build fixture DB
        run: uv run python tests/fixtures/create_test_db.py

      - name: Unit tests
        run: uv run pytest -m unit -v --tb=short

  integration-tests:
    name: Integration tests (live DB)
    runs-on: ubuntu-latest
    if: false  # requires ~/.fpl/fpl.db — run manually or on self-hosted runner with DB access

    steps:
      - uses: actions/checkout@v4

      - name: Install uv
        uses: astral-sh/setup-uv@v4
        with:
          version: "latest"

      - name: Set up Python
        run: uv python install 3.12

      - name: Install dependencies
        run: uv sync --all-extras

      - name: Integration tests
        run: uv run pytest -m integration -v --tb=short
