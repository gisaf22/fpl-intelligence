  - signal: fdr_avg
    family: Context
    scope: Match
    temporal_type: estimate
    status: complete

    persistence_class: not-applicable
    sparsity_level: not-applicable
    behavioral_basis: >
      Pre-match fixture difficulty rating — fully determined before any match begins.
      Negative rho confirmed at all positions (DEF rho=-0.196, MID rho=-0.159) — harder
      fixtures associate with fewer points, as expected. But fails decision relevance at
      all positions: Q5-Q1 gap is negative and non-monotonic across quintiles, meaning the
      signal cannot be used as a simple directional rank indicator. Ontology ineligible
      for temporal aggregation.
    redundancy_flags:
      - absorbs: fdr_max (G-EDA6-01; pairwise rho=1.0)
      - absorbs: fdr_min (G-EDA6-01; pairwise rho=1.0)
    gate_decisions:
      - G-EDA6-01  # fdr_avg/max/min perfectly redundant; fdr_avg sole representative

    lens_findings:
      - lens: LENS-FIXTURE-GW
        findings:
          fdr_avg (FIXTURE-001):
            GK: uninformative   # rho=-0.147; CI excludes zero but fails decision relevance (Q5-Q1=-1.325)
            DEF: uninformative  # rho=-0.196; fails decision relevance (Q5-Q1=-2.039, not monotonic)
            MID: uninformative  # rho=-0.159; fails decision relevance (Q5-Q1=-1.456)
            FWD: uninformative  # rho=-0.092; fails decision relevance (Q5-Q1=-1.041)

    representation_implications:
      rejected:
        - representation: fdr_avg rolling mean
          status: REJECTED-SEMANTIC
          basis: Context family — pre-match fixed; temporal aggregation produces historical
                 average of pre-match properties, not a forward-looking signal
        - representation: fdr_avg as directional rank indicator
          status: REJECTED-BEHAVIORAL
          basis: LENS-FIXTURE-GW FIXTURE-001 — fails decision relevance at all positions;
                 non-monotonic quintile ordering; cannot function as a simple rank signal
      conditional:
        - representation: fdr_avg as binary difficulty moderator
          status: CONDITIONAL — not yet validated
          basis: may condition other signals in stratified analysis (easy/medium/hard tercile);
                 this is a SYNTH-01 question, not a standalone representation

