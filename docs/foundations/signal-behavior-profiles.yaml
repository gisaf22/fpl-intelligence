  - signal: fixture_count
    family: Context
    scope: Match
    temporal_type: count
    status: decision-closed

    decision: ontology-derived-exclusion
    decision_basis: >
      Context family — pre-match fixed; Layer 3 ineligible by ontology. Additionally
